// ── HELPERS ──
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pickW(obj){ const t=Object.values(obj).reduce((s,v)=>s+v,0); let r=Math.random()*t; for(const[k,v] of Object.entries(obj)){r-=v;if(r<=0)return k;} return Object.keys(obj)[0]; }
// ══════════════════════════════════════════════════════════
// AUDIO ENGINE (Web Audio API — no files needed)
// ══════════════════════════════════════════════════════════
const SFX = (() => {
  let ctx = null;
  const getCtx = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  };

  const play = (fn) => {
    try { fn(getCtx()); } catch(e) {}
  };

  // Scratch hiss — layered filtered noise shaped like paper friction
  const scratch = () => play(ac => {
    const dur = 0.055;
    const len = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const data = buf.getChannelData(0);
    // Smooth noise: average adjacent random values to reduce harsh high partials
    let prev = 0;
    for (let i = 0; i < len; i++) {
      const raw = Math.random() * 2 - 1;
      prev = prev * 0.65 + raw * 0.35; // low-pass the raw noise
      data[i] = prev;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;

    // Highpass — remove low rumble below ~800 Hz
    const hp = ac.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 800 + Math.random() * 400;
    hp.Q.value = 0.5;

    // Lowpass — soft ceiling around 5kHz, no harsh top-end crackle
    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 4500 + Math.random() * 500;
    lp.Q.value = 0.4;

    // Smooth gain envelope: quick attack, fast decay — no click at start
    const gain = ac.createGain();
    const t = ac.currentTime;
    gain.gain.setValueAtTime(0.0, t);
    gain.gain.linearRampToValueAtTime(0.07, t + 0.008); // soft attack
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);

    src.connect(hp); hp.connect(lp); lp.connect(gain); gain.connect(ac.destination);
    src.start();
    src.stop(t + dur);
  });

  // Coin pop — ascending blip
  const coin = (i = 0) => play(ac => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(520 + i * 80, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(680 + i * 80, ac.currentTime + 0.08);
    gain.gain.setValueAtTime(0.12, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime + 0.12);
  });

  // Win fanfare — short ascending chord arp
  const win = () => play(ac => {
    [0, 4, 7, 12].forEach((semitone, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'square';
      const freq = 440 * Math.pow(2, semitone / 12);
      osc.frequency.value = freq;
      const t = ac.currentTime + i * 0.08;
      gain.gain.setValueAtTime(0.0, t);
      gain.gain.linearRampToValueAtTime(0.1, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(t); osc.stop(t + 0.25);
    });
  });

  // Loss thud
  const loss = () => play(ac => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, ac.currentTime + 0.18);
    gain.gain.setValueAtTime(0.14, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime + 0.2);
  });

  // UI click — tiny tick
  const click = () => play(ac => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'square';
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.06, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.04);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime + 0.04);
  });

  // Floor clear jingle
  const floorClear = () => play(ac => {
    [[0,0],[4,0.1],[7,0.2],[12,0.3],[16,0.4]].forEach(([semi,delay]) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.value = 330 * Math.pow(2, semi / 12);
      const t = ac.currentTime + delay;
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(t); osc.stop(t + 0.4);
    });
  });

  // Haptic feedback — no-op on desktop, works on mobile
  const vibe = (pattern) => {
    try { if(navigator.vibrate) navigator.vibrate(pattern); } catch(e){}
  };

  return {
    scratch: ()=>{ scratch(); vibe(3); },
    coin:    (i)=>{ coin(i);   vibe(20+i*5); },
    win:     ()=>{ win();      vibe([30,20,30,20,80]); },
    loss:    ()=>{ loss();     vibe([60,30,60]); },
    click:   ()=>{ click();    vibe(8); },
    floorClear: ()=>{ floorClear(); vibe([40,30,40,30,100]); },
  };
})();


function newState(cls, diff){
  const s={
    hp:Math.max(1,cls.hp+diff.hpBonus), maxHp:Math.max(1,cls.hp+diff.hpBonus),
    coins:cls.coins+diff.startCoins, totalCoins:0,
    floor:1, maxFloor:5,
    relics:[], relicIds:[],
    classId:cls.id,
    winChance:0.28+diff.winBonus, winMult:1.0,
    shopDiscount:0, damageMult:1, freeReveals:0,
    mirrorChance:0, healOnWin:false, damageReduce:0,
    bombActive:false, bombUsed:false, eliteMult:1,
    floorBonus:0, showMechanic:false,
    guaranteedWin:false, shielded:false,
    totalScratches:0, wins:0, scratchesThisFloor:0,
    nodeMap:[], startTime:Date.now(),
  };
  cls.bonus(s);
  if(cls.startRelic){ const r=RELICS.find(r=>r.id===cls.startRelic); if(r&&!s.relicIds.includes(r.id)){s.relicIds.push(r.id);s.relics.push(r);r.apply(s);} }
  return s;
}

function genMap(floor, extraNodes=0){
  const w={scratch:floor<4?55:35,elite:floor>1?15:0,shop:15,encounter:15,rest:floor>1?10:0};
  return [0,1,2,3].map(r=>{
    const count=r===0||r===3?1:2+(extraNodes>0&&Math.random()<0.4?1:0);
    return Array.from({length:count},(_,c)=>({
      type:r===3?(floor===5?'boss':'scratch'):pickW(w),
      id:`n${r}_${c}`, row:r, col:c,
      state:r===0?'available':'locked'
    }));
  });
}

// ── Evaluate actual grid for win condition (used by both genCard and getWinIndices) ──
function evalGrid(grid, theme, base){
  const counts={};
  grid.forEach((s,i)=>{ counts[s]=counts[s]||[]; counts[s].push(i); });
  const isBin=s=>s==='0️⃣'||s==='1️⃣';

  switch(theme.mechanic){
    case'match3':{
      for(const[sym,idxs] of Object.entries(counts)){
        if(idxs.length>=3) return{win:base,winType:"MATCH 3!",winIdx:idxs};
      }
      return null;
    }
    case'key_multiplier':{
      const keyIdx=grid.findIndex(s=>s==='🔑');
      const hasKey=keyIdx!==-1;
      for(const[sym,idxs] of Object.entries(counts)){
        if(sym!=='🔑'&&idxs.length>=3){
          const mult=hasKey?2:1;
          // Include the key cell in winIdx so it gets highlighted too
          const winIdx=hasKey?[...idxs,keyIdx]:idxs;
          return{win:Math.floor(base*mult),winType:hasKey?"GOLDEN KEY x2!":"MATCH 3!",winIdx};
        }
      }
      return null;
    }
    case'binary':{
      for(let r=0;r<3;r++){
        const row=[r*3,r*3+1,r*3+2];
        if(row.every(i=>isBin(grid[i]))) return{win:Math.floor(base*1.5),winType:"BINARY HACK!",winIdx:row};
      }
      for(let c=0;c<3;c++){
        const col=[c,c+3,c+6];
        if(col.every(i=>isBin(grid[i]))) return{win:Math.floor(base*1.5),winType:"BINARY HACK!",winIdx:col};
      }
      return null;
    }
    case'adjacency':{
      const seeds=grid.map((s,i)=>s==='🌱'?i:-1).filter(i=>i!==-1);
      const waters=grid.map((s,i)=>s==='💧'?i:-1).filter(i=>i!==-1);
      for(const si of seeds){
        for(const wi of waters){
          const dr=Math.abs(Math.floor(si/3)-Math.floor(wi/3));
          const dc=Math.abs(si%3-wi%3);
          if(dr+dc===1) return{win:base,winType:"GARDEN GROWTH!",winIdx:[si,wi]};
        }
      }
      return null;
    }
    case'risk_reward':{
      for(const[sym,idxs] of Object.entries(counts)){
        if(idxs.length>=3) return{win:Math.floor(base*2.5),winType:"NEON PULSE!",winIdx:idxs};
      }
      return null;
    }
    default: return null;
  }
}

// ── Break accidental win conditions on losing cards ──
function breakWinCondition(grid, theme){
  const syms=[...theme.symbols];
  // For match3/key_multiplier/risk_reward: ensure no symbol appears 3+ times
  // by replacing extras with a different symbol
  if(['match3','key_multiplier','risk_reward'].includes(theme.mechanic)){
    // Rebuild counts fresh each pass until no symbol appears 3+ times
    let changed=true;
    let passes=0;
    while(changed&&passes<10){
      changed=false; passes++;
      const counts={};
      grid.forEach((s,i)=>{ counts[s]=counts[s]||[]; counts[s].push(i); });
      for(const[sym,idxs] of Object.entries(counts)){
        if(sym==='🔑') continue;
        if(idxs.length>=3){
          // Replace the last occurrence with a different symbol
          const replaceIdx=idxs[idxs.length-1];
          const others=syms.filter(s=>s!==sym&&s!=='🔑');
          grid[replaceIdx]=others[Math.floor(Math.random()*others.length)];
          changed=true;
          break; // restart scan with fresh counts
        }
      }
    }
  }
  // For binary: ensure no full row/col of binary digits
  if(theme.mechanic==='binary'){
    const isBin=s=>s==='0️⃣'||s==='1️⃣';
    const nonBin=syms.filter(s=>!isBin(s));
    for(let r=0;r<3;r++){
      const row=[r*3,r*3+1,r*3+2];
      if(row.every(i=>isBin(grid[i]))) grid[row[2]]=nonBin[Math.floor(Math.random()*nonBin.length)];
    }
    for(let c=0;c<3;c++){
      const col=[c,c+3,c+6];
      if(col.every(i=>isBin(grid[i]))) grid[col[2]]=nonBin[Math.floor(Math.random()*nonBin.length)];
    }
  }
  // For adjacency: ensure no seed adjacent to water
  if(theme.mechanic==='adjacency'){
    const seeds=grid.map((s,i)=>s==='🌱'?i:-1).filter(i=>i!==-1);
    const waters=grid.map((s,i)=>s==='💧'?i:-1).filter(i=>i!==-1);
    const others=syms.filter(s=>s!=='🌱'&&s!=='💧');
    for(const si of seeds){
      for(const wi of waters){
        const dr=Math.abs(Math.floor(si/3)-Math.floor(wi/3));
        const dc=Math.abs(si%3-wi%3);
        if(dr+dc===1) grid[wi]=others[Math.floor(Math.random()*others.length)];
      }
    }
  }
}

function genCard(s, nodeType){
  const isElite=nodeType==='elite';
  const isBoss=nodeType==='boss';
  const tidx=Math.min(s.floor-1, THEMES.length-1);
  const theme=THEMES[isBoss?THEMES.length-1:isElite?Math.min(tidx+1,THEMES.length-1):tidx];
  const syms=[...theme.symbols];
  const minW=[20,60,150,400,1000][s.floor-1]*(isElite?2:1)*(isBoss?3:1);
  const maxW=[80,200,500,1200,3000][s.floor-1]*(isElite?2:1)*(isBoss?4:1);
  const base=Math.floor(Math.random()*(maxW-minW+1))+minW;

  // Start with random grid
  const grid=Array.from({length:9},()=>syms[Math.floor(Math.random()*syms.length)]);

  // Determine if this card should win
  const shouldWin = s.guaranteedWin || (s.bombActive&&!s.bombUsed) ||
                    Math.random()<Math.min(0.75,s.winChance);

  if(shouldWin){
    // Force the win condition into the grid
    switch(theme.mechanic){
      case'match3':{
        const sym=syms[Math.floor(Math.random()*syms.length)];
        shuffle([0,1,2,3,4,5,6,7,8]).slice(0,3).forEach(i=>grid[i]=sym);
        break;
      }
      case'key_multiplier':{
        // Pick a non-key symbol, place 3 of them at random positions
        const sym=syms.filter(s=>s!=='🔑')[Math.floor(Math.random()*(syms.length-1))];
        const matchPositions=shuffle([0,1,2,3,4,5,6,7,8]).slice(0,3);
        matchPositions.forEach(i=>grid[i]=sym);
        // Place key at a position that is NOT one of the 3 matched cells
        if(Math.random()<0.35){
          const remaining=[0,1,2,3,4,5,6,7,8].filter(i=>!matchPositions.includes(i));
          grid[remaining[Math.floor(Math.random()*remaining.length)]]='🔑';
        }
        break;
      }
      case'binary':{
        const row=Math.floor(Math.random()*3);
        for(let c=0;c<3;c++) grid[row*3+c]=syms[Math.floor(Math.random()*2)];
        break;
      }
      case'adjacency':{
        grid[4]='🌱';
        grid[[1,3,5,7][Math.floor(Math.random()*4)]]='💧';
        break;
      }
      case'risk_reward':{
        const sym=syms[Math.floor(Math.random()*syms.length)];
        [0,3,6].forEach(i=>grid[i]=sym);
        break;
      }
    }
  } else {
    // Losing card — actively break any accidental win conditions in the random grid
    breakWinCondition(grid, theme);
  }

  // Evaluate the actual grid to get the real win/winType
  const evalResult = shouldWin ? evalGrid(grid, theme, base) : null;
  let win = evalResult ? evalResult.win : 0;
  let winType = evalResult ? evalResult.winType : null;

  // Safety net: shouldWin but evalGrid returned null means grid placement went wrong
  // Give minimum payout so the player is never cheated
  if(shouldWin && !evalResult && !s.guaranteedWin && !(s.bombActive&&!s.bombUsed)){
    win=minW; winType="LUCKY FIND!";
  }
  // Special overrides
  if(s.guaranteedWin && win===0){ win=Math.floor(base*0.6); winType="GUARANTEED WIN!"; }
  if(s.bombActive&&!s.bombUsed && win===0){ win=minW; winType="BOMB TRIGGERED!"; }

  win=Math.floor(win*(s.winMult||1));
  if(isElite) win=Math.floor(win*(s.eliteMult||1));
  if(isBoss)  win=Math.floor(win*1.5); // boss pays 50% more on top
  if(win>0&&s.mirrorChance>0&&Math.random()<s.mirrorChance) win*=2;

  return{grid,win,winType,theme,isElite,isBoss,floor:s.floor,peekWin:s.showMechanic?win:null};
}

// ── CARD PALETTE HELPER ──
const CARD_PALS={
  classic:{bg:"#1a0a00",border:"#f0c040",stripe:"#2a1400",acc:"#804000"},
  dungeon:{bg:"#0a001a",border:"#9060e0",stripe:"#140028",acc:"#400080"},
  cyber:  {bg:"#001a1a",border:"#40d8e0",stripe:"#002828",acc:"#006060"},
  nature: {bg:"#001a00",border:"#40e880",stripe:"#002800",acc:"#006000"},
  chaos:  {bg:"#1a001a",border:"#e060a0",stripe:"#280028",acc:"#800040"},
};

// Canvas is GRID-ONLY: 300×300 (3×3 cells, 8px gap each side)
// Header and footer are DOM elements outside the canvas stack.
function renderCardBg(canvas, theme, isElite, grid){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height; // 300×300
  const p=CARD_PALS[theme.id]||CARD_PALS.classic;
  // Background fill + pixel stripe
  ctx.fillStyle=p.bg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=p.stripe;
  for(let x=0;x<W;x+=8) ctx.fillRect(x,0,4,H);
  for(let y=0;y<H;y+=8) ctx.fillRect(0,y,W,4);
  // 3×3 symbol grid
  const gap=6, pad=6;
  const cellW=Math.floor((W-pad*2-gap*2)/3);
  const cellH=Math.floor((H-pad*2-gap*2)/3);
  const fontSize=Math.floor(cellH*0.55);
  ctx.font=`${fontSize}px serif`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  for(let r=0;r<3;r++){
    for(let c=0;c<3;c++){
      const cx=pad+c*(cellW+gap);
      const cy=pad+r*(cellH+gap);
      ctx.fillStyle="#0a0a0a"; ctx.fillRect(cx,cy,cellW,cellH);
      ctx.strokeStyle=p.acc; ctx.lineWidth=1.5; ctx.strokeRect(cx,cy,cellW,cellH);
      if(grid&&grid[r*3+c]) ctx.fillText(grid[r*3+c], cx+cellW/2, cy+cellH/2+1);
    }
  }
}

function renderScratchLayer(canvas, theme){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height; // 300×300
  const cols={classic:"#7a5010",dungeon:"#3a1060",cyber:"#005858",nature:"#104a10",chaos:"#5a0838"};
  // Solid foil fill
  ctx.fillStyle=cols[theme.id]||"#7a5010"; ctx.fillRect(0,0,W,H);
  // Pixel grid texture
  ctx.fillStyle="rgba(0,0,0,0.28)";
  for(let x=0;x<W;x+=4) ctx.fillRect(x,0,2,H);
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2);
  // Sparkle dots
  ctx.fillStyle="rgba(255,255,200,0.12)";
  for(let i=0;i<80;i++){
    const sx=Math.floor(Math.random()*W/4)*4, sy=Math.floor(Math.random()*H/4)*4;
    ctx.fillRect(sx,sy,4,4);
  }
  // Centre hint text
  ctx.fillStyle="rgba(255,255,255,0.22)";
  ctx.font="bold 16px monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("✦ SCRATCH HERE ✦",W/2,H/2-10);
  ctx.font="9px monospace";
  ctx.fillText("SLIDE TO REVEAL",W/2,H/2+14);
}


// ── CELL GEOMETRY HELPER ──
// Returns {cx,cy,cellW,cellH} for a grid cell on the 300×300 grid canvas
function cellGeom(idx){
  const gap=6, pad=6, W=300, H=300;
  const cellW=Math.floor((W-pad*2-gap*2)/3);
  const cellH=Math.floor((H-pad*2-gap*2)/3);
  const r=Math.floor(idx/3), c=idx%3;
  return{ cx:pad+c*(cellW+gap), cy:pad+r*(cellH+gap), cellW, cellH };
}

// ── LIVE MATCH TRACKER ──
// Returns an array of {symbol, count, isMatch} objects for the revealed cells
function getLiveTracker(grid, theme, revealedCells){
  const revealed=[...revealedCells];
  if(revealed.length===0) return [];

  switch(theme.mechanic){
    case'match3':
    case'key_multiplier':
    case'risk_reward':{
      // Count each symbol among revealed cells
      const counts={};
      revealed.forEach(i=>{
        const s=grid[i];
        if(s!=='🔑') counts[s]=(counts[s]||0)+1;
      });
      // Sort by count desc, show top 4
      return Object.entries(counts)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,4)
        .map(([sym,count])=>({sym,count,isMatch:count>=3}));
    }
    case'binary':{
      // Show row/col progress: how many cells in each row/col are binary digits
      const isBin=s=>s==='0️⃣'||s==='1️⃣';
      const rows=[];
      for(let r=0;r<3;r++){
        const rowIdx=[r*3,r*3+1,r*3+2];
        const revCount=rowIdx.filter(i=>revealedCells.has(i)).length;
        const binCount=rowIdx.filter(i=>revealedCells.has(i)&&isBin(grid[i])).length;
        if(revCount>0) rows.push({label:`ROW ${r+1}`,count:binCount,total:revCount,isMatch:binCount===3&&revCount===3});
      }
      for(let c=0;c<3;c++){
        const colIdx=[c,c+3,c+6];
        const revCount=colIdx.filter(i=>revealedCells.has(i)).length;
        const binCount=colIdx.filter(i=>revealedCells.has(i)&&isBin(grid[i])).length;
        if(revCount>0) rows.push({label:`COL ${c+1}`,count:binCount,total:revCount,isMatch:binCount===3&&revCount===3});
      }
      return rows;
    }
    case'adjacency':{
      const seeds=revealed.filter(i=>grid[i]==='🌱');
      const waters=revealed.filter(i=>grid[i]==='💧');
      const adjacent=seeds.some(si=>waters.some(wi=>{
        const dr=Math.abs(Math.floor(si/3)-Math.floor(wi/3));
        const dc=Math.abs(si%3-wi%3);
        return dr+dc===1;
      }));
      return[
        {sym:'🌱',count:seeds.length,isMatch:false,label:'SEEDS'},
        {sym:'💧',count:waters.length,isMatch:false,label:'WATER'},
        {sym:adjacent?'✓':'✗',count:0,isMatch:adjacent,label:adjacent?'ADJACENT!':'NOT YET'},
      ];
    }
    default: return [];
  }
}

// ══════════════════════════════════════════════════════════
// SCRATCH CARD COMPONENT
// ══════════════════════════════════════════════════════════
function ScratchCardView({ card, freeReveals: initFreeReveals, onReveal, onBack }){
  const bgRef      = useRef(null);
  const scratchRef = useRef(null);
  const dustRef    = useRef(null);   // overlay canvas for scratch dust
  const containerRef = useRef(null);

  const [pct,setPct]           = useState(0);
  const [revealed,setRevealed] = useState(false);
  const [freeReveals,setFreeReveals] = useState(initFreeReveals);

  // Win animation state
  const [popups,setPopups]         = useState([]);
  const [showContinue,setShowContinue] = useState(false);
  const [winBanner,setWinBanner]   = useState(null);
  const [revealedCells,setRevealedCells] = useState(new Set());
  const [shake,setShake]           = useState(false); // screen shake on win

  const drawing   = useRef(false);
  const lastPos   = useRef(null);
  const initDone  = useRef(false);
  const revealedRef = useRef(false); // sync ref for callbacks
  const dustParticles = useRef([]);
  const dustRaf   = useRef(null);

  // ── init canvases ──
  useEffect(()=>{
    if(!bgRef.current||!scratchRef.current||!dustRef.current||initDone.current) return;
    initDone.current=true;
    renderCardBg(bgRef.current, card.theme, card.isElite, card.grid);
    renderScratchLayer(scratchRef.current, card.theme);
    const dc=dustRef.current; dc.width=300; dc.height=300;
    const dctx=dc.getContext('2d'); dctx.clearRect(0,0,300,300);
  },[card]);

  // ── dust particle loop ──
  const tickDust=useCallback(()=>{
    const dc=dustRef.current; if(!dc) return;
    const dctx=dc.getContext('2d');
    dctx.clearRect(0,0,dc.width,dc.height);
    dustParticles.current=dustParticles.current
      .map(p=>({...p,x:p.x+p.vx,y:p.y+p.vy,vy:p.vy+0.12,life:p.life-p.decay}))
      .filter(p=>p.life>0);
    dustParticles.current.forEach(p=>{
      dctx.globalAlpha=p.life*0.9;
      dctx.fillStyle=p.color;
      // pixelated squares, not circles
      const sz=Math.ceil(p.size*p.life);
      dctx.fillRect(Math.round(p.x),Math.round(p.y),sz,sz);
    });
    dctx.globalAlpha=1;
    if(dustParticles.current.length>0){
      dustRaf.current=requestAnimationFrame(tickDust);
    } else {
      dustRaf.current=null;
    }
  },[]);

  const spawnDust=(x,y,themeColor)=>{
    const base=[themeColor,"#ffffff","#cccccc","#888888","#ffeeaa"];
    const n=5+Math.floor(Math.random()*4);
    for(let i=0;i<n;i++){
      dustParticles.current.push({
        x:x+(Math.random()-0.5)*8,
        y:y+(Math.random()-0.5)*8,
        vx:(Math.random()-0.5)*3.5,
        vy:(Math.random()-1.8)*3,
        size:2+Math.random()*3,
        color:base[Math.floor(Math.random()*base.length)],
        life:0.7+Math.random()*0.5,
        decay:0.025+Math.random()*0.02,
      });
    }
    if(!dustRaf.current) dustRaf.current=requestAnimationFrame(tickDust);
  };

  useEffect(()=>()=>{ if(dustRaf.current)cancelAnimationFrame(dustRaf.current); },[]);

  // ── canvas position ──
  const getPos=(e,canvas)=>{
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-rect.left)*sx, y:(src.clientY-rect.top)*sy};
  };

  // ── scratch stroke ──
  const doScratch=useCallback((x,y)=>{
    if(revealedRef.current) return;
    const canvas=scratchRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    ctx.globalCompositeOperation='destination-out';
    ctx.lineWidth=48; ctx.lineCap='round'; ctx.lineJoin='round';
    if(lastPos.current){
      ctx.beginPath(); ctx.moveTo(lastPos.current.x,lastPos.current.y); ctx.lineTo(x,y); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(x,y,24,0,Math.PI*2); ctx.fill();
    }
    lastPos.current={x,y};

    // Dust at scratch position
    spawnDust(x,y,card.theme.color);
    // Scratch sound (throttled)
    if(Math.random()<0.18) SFX.scratch();

    // Measure revealed % and detect which cells are uncovered
    const d=ctx.getImageData(0,0,canvas.width,canvas.height).data;
    let trans=0;
    for(let i=3;i<d.length;i+=16) if(d[i]<64) trans++;
    const p=(trans/(canvas.width*canvas.height/4))*100;
    setPct(p);

    // Check each cell — sample its centre pixel to see if foil is gone
    const newRevealed=new Set();
    for(let idx=0;idx<9;idx++){
      const {cx,cy,cellW,cellH}=cellGeom(idx);
      const sampleX=Math.floor(cx+cellW/2);
      const sampleY=Math.floor(cy+cellH/2);
      // Sample a small region around centre (5×5)
      let clearCount=0;
      for(let dy=-2;dy<=2;dy++) for(let dx=-2;dx<=2;dx++){
        const px=(sampleY+dy)*canvas.width+(sampleX+dx);
        if(d[px*4+3]<64) clearCount++;
      }
      if(clearCount>=12) newRevealed.add(idx); // >50% of samples clear = revealed
    }
    setRevealedCells(prev=>{
      if(newRevealed.size===prev.size&&[...newRevealed].every(i=>prev.has(i))) return prev;
      return newRevealed;
    });

    const threshold=card.isBoss?88:(card.theme.mechanic==='risk_reward'?82:72);
    if(p>=threshold) triggerReveal();
  },[card]);

  // ── reveal + win animation sequence ──
  const triggerReveal=useCallback(()=>{
    if(revealedRef.current) return;
    revealedRef.current=true;
    setRevealed(true);

    // Clear scratch layer
    const sc=scratchRef.current;
    if(sc){ sc.getContext('2d').clearRect(0,0,sc.width,sc.height); }

    if(card.win<=0){
      // Loss — brief delay then callback
      SFX.loss();
      setWinBanner({text:"NO WIN",color:C.muted});
      setTimeout(()=>onReveal(card.win,card.winType),1200);
      return;
    }

    // Find winning cell indices based on mechanic
    const winIdx=getWinIndices(card);
    // Stagger cell highlights
    winIdx.forEach((idx,i)=>{
      setTimeout(()=>{
        // Coin popup for this cell
        const {cx,cy,cellW,cellH}=cellGeom(idx);
        const perCell=Math.floor(card.win/Math.max(winIdx.length,1));
        const cRect=containerRef.current?.getBoundingClientRect();
        const bgC=bgRef.current?.getBoundingClientRect();
        // Use canvas-relative coords for popup positioning
        const popX=cx+cellW/2;
        const popY=cy+cellH/2-20;
        setPopups(prev=>[...prev,{
          id:Date.now()+i,
          cx:popX, cy:popY,
          text:`+${perCell}`,
          color:card.theme.color,
          phase:'rise',
        }]);
        SFX.coin(i);
        // Highlight flash on bg canvas
        flashCell(bgRef.current,idx,card.theme.color,i);
      },i*180);
    });

    // Win banner + sound + screen shake
    setTimeout(()=>{
      setWinBanner({text:card.winType||"WIN!",color:card.theme.color});
      SFX.win();
      setShake(true);
      setTimeout(()=>setShake(false), 500);
    },winIdx.length*180+200);

    // Show continue button and fire callback after all animations
    const totalDelay=winIdx.length*180+2000;
    setTimeout(()=>{
      setShowContinue(true);
    },totalDelay);
    // Callback fires when player presses continue (not auto)
  },[card,onReveal]);

  const flashCell=(canvas,idx,color,wave)=>{
    if(!canvas) return;
    const ctx=canvas.getContext('2d');
    const {cx,cy,cellW,cellH}=cellGeom(idx);
    let t=0;
    const frames=22;
    const step=()=>{
      t++;
      const pulse=Math.sin((t/frames)*Math.PI); // 0→1→0
      ctx.save();
      // Thin tinted overlay — just enough to tint, symbol still clearly visible
      ctx.globalAlpha=pulse*0.18;
      ctx.fillStyle=color;
      ctx.fillRect(cx+1,cy+1,cellW-2,cellH-2);
      // Thick glowing border — this is the real highlight
      ctx.globalAlpha=pulse*0.9;
      ctx.strokeStyle=color;
      ctx.lineWidth=3;
      ctx.strokeRect(cx+2,cy+2,cellW-4,cellH-4);
      // Inner white flash border on peak
      if(pulse>0.5){
        ctx.globalAlpha=(pulse-0.5)*2*0.6;
        ctx.strokeStyle="#ffffff";
        ctx.lineWidth=1.5;
        ctx.strokeRect(cx+5,cy+5,cellW-10,cellH-10);
      }
      ctx.restore();
      if(t<frames){ requestAnimationFrame(step); }
      else {
        // Persistent state: redraw cell bg to clear overlays, then draw clean border+symbol
        // Repaint the cell background cleanly
        const p=CARD_PALS[card.theme.id]||CARD_PALS.classic;
        ctx.fillStyle="#0a0a0a"; ctx.fillRect(cx,cy,cellW,cellH);
        // Persistent colored border (thicker, no fill overlay)
        ctx.strokeStyle=color; ctx.lineWidth=3;
        ctx.strokeRect(cx+1.5,cy+1.5,cellW-3,cellH-3);
        // Corner accent squares (pixel art style)
        ctx.fillStyle=color;
        [[cx,cy],[cx+cellW-4,cy],[cx,cy+cellH-4],[cx+cellW-4,cy+cellH-4]].forEach(([px,py])=>{
          ctx.fillRect(px,py,4,4);
        });
        // Redraw emoji on top
        const fontSize=Math.floor(cellH*0.55);
        ctx.font=`${fontSize}px serif`;
        ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText(card.grid[idx], cx+cellW/2, cy+cellH/2+1);
      }
    };
    setTimeout(()=>requestAnimationFrame(step), wave*180);
  };

  const autoReveal=()=>{
    if(freeReveals<=0||revealedRef.current) return;
    setFreeReveals(f=>f-1);
    // Big dust burst on auto reveal
    for(let i=0;i<6;i++){
      const x=50+Math.random()*200, y=50+Math.random()*300;
      spawnDust(x,y,card.theme.color);
    }
    const sc=scratchRef.current;
    if(sc){ sc.getContext('2d').clearRect(0,0,sc.width,sc.height); }
    setPct(100);
    triggerReveal();
  };

  // Animate popups
  useEffect(()=>{
    if(!popups.length) return;
    const id=requestAnimationFrame(()=>{
      setPopups(prev=>prev
        .map(p=>({...p,cy:p.cy-1.8,phase:p.cy<-20?'done':p.phase}))
        .filter(p=>p.phase!=='done')
      );
    });
    return()=>cancelAnimationFrame(id);
  },[popups]);

  const handleContinue=()=>onReveal(card.win,card.winType);

  const bc=card.isBoss?"#ff4040":card.isElite?"#ffff80":card.theme.color;
  const pal=CARD_PALS[card.theme.id]||CARD_PALS.classic;
  const cardW="min(300px,88vw)";

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,width:"100%",padding:"8px 12px 0"}}>

      {/* ── CARD FRAME (header + grid + footer, all DOM) ── */}
      <div style={{width:cardW,border:`3px solid ${bc}`,background:pal.bg,flexShrink:0,
        animation:shake?`cardShake 0.45s ease-out`:"none"}}>

        {/* HEADER — always visible, never covered by foil */}
        <div style={{background:pal.acc,borderBottom:`2px solid ${bc}`,padding:"5px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:7,color:bc,letterSpacing:1}}>
            {card.theme.name}{card.isBoss?" ☠ BOSS":card.isElite?" ★ ELITE":""}
          </span>
          {card.isBoss&&<span style={{fontSize:9,color:"#ff4040",fontFamily:"'Press Start 2P',monospace"}}>☠</span>}
          {!card.isBoss&&card.isElite&&<span style={{fontSize:7,color:"#ffff80",fontFamily:"'Press Start 2P',monospace"}}>★</span>}
        </div>

        {/* GOAL HINT + LIVE TRACKER */}
        <div style={{background:"rgba(0,0,0,0.7)",borderBottom:`1px solid ${pal.acc}`,padding:"4px 8px"}}>
          {/* Goal rule */}
          <div style={{textAlign:"center",marginBottom:revealedCells.size>0&&!revealed?4:0}}>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,color:card.theme.color,letterSpacing:1}}>
              {card.theme.goal}
            </span>
          </div>
          {/* Live tally — only shown while scratching */}
          {revealedCells.size>0&&!revealed&&(()=>{
            const tracker=getLiveTracker(card.grid,card.theme,revealedCells);
            if(!tracker.length) return null;
            const isBinary=card.theme.mechanic==='binary';
            const isAdj=card.theme.mechanic==='adjacency';
            return(
              <div style={{display:"flex",justifyContent:"center",gap:6,flexWrap:"wrap"}}>
                {tracker.map((item,i)=>{
                  if(isBinary){
                    return(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:3,
                        background:item.isMatch?"rgba(64,216,224,0.15)":"rgba(255,255,255,0.05)",
                        border:`1px solid ${item.isMatch?card.theme.color:'#333'}`,
                        padding:"2px 6px"}}>
                        <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,
                          color:item.isMatch?card.theme.color:C.muted}}>
                          {item.label} {item.count}/{item.total||3}
                        </span>
                        {item.isMatch&&<span style={{fontSize:10}}>✓</span>}
                      </div>
                    );
                  }
                  if(isAdj){
                    return(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:2,
                        background:item.isMatch?"rgba(64,232,128,0.15)":"rgba(255,255,255,0.05)",
                        border:`1px solid ${item.isMatch?card.theme.color:'#333'}`,
                        padding:"2px 5px"}}>
                        <span style={{fontSize:12}}>{item.sym}</span>
                        {item.count>0&&<span style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,color:item.isMatch?card.theme.color:C.muted}}>×{item.count}</span>}
                        {item.count===0&&<span style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:item.isMatch?card.theme.color:C.muted}}>{item.label}</span>}
                      </div>
                    );
                  }
                  // match3 / key_multiplier / risk_reward
                  return(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:3,
                      background:item.isMatch?"rgba(240,192,64,0.2)":"rgba(255,255,255,0.05)",
                      border:`1px solid ${item.isMatch?C.gold:'#333'}`,
                      padding:"2px 6px",
                      boxShadow:item.isMatch?`0 0 6px ${C.gold}66`:"none",
                      }}>
                      <span style={{fontSize:14,lineHeight:1}}>{item.sym}</span>
                      <span style={{fontFamily:"'Press Start 2P',monospace",
                        fontSize:item.isMatch?8:6,
                        color:item.isMatch?C.gold:item.count===2?C.orange:C.muted,
                        fontWeight:item.isMatch?"bold":"normal",
                      }}>×{item.count}{item.isMatch?" ✓":""}</span>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>

        {/* CANVAS GRID STACK — foil only covers this area */}
        <div ref={containerRef} style={{position:"relative",width:"100%",aspectRatio:"1/1"}}>

          {/* Layer 1 – symbol grid bg */}
          <canvas ref={bgRef} width={300} height={300}
            style={{position:"absolute",inset:0,width:"100%",height:"100%",display:"block"}}/>

          {/* Layer 2 – scratch foil */}
          <canvas ref={scratchRef} width={300} height={300}
            style={{position:"absolute",inset:0,width:"100%",height:"100%",display:"block",
              touchAction:"none",cursor:revealed?"default":"crosshair"}}
            onMouseDown={e=>{if(revealed)return;drawing.current=true;const p=getPos(e,scratchRef.current);doScratch(p.x,p.y);}}
            onMouseMove={e=>{if(!drawing.current||revealed)return;const p=getPos(e,scratchRef.current);doScratch(p.x,p.y);}}
            onMouseUp={()=>{drawing.current=false;lastPos.current=null;}}
            onMouseLeave={()=>{drawing.current=false;lastPos.current=null;}}
            onTouchStart={e=>{e.preventDefault();if(revealed)return;drawing.current=true;const p=getPos(e,scratchRef.current);doScratch(p.x,p.y);}}
            onTouchMove={e=>{e.preventDefault();if(!drawing.current||revealed)return;const p=getPos(e,scratchRef.current);doScratch(p.x,p.y);}}
            onTouchEnd={()=>{drawing.current=false;lastPos.current=null;}}
          />

          {/* Layer 3 – scratch dust particles */}
          <canvas ref={dustRef} width={300} height={300}
            style={{position:"absolute",inset:0,width:"100%",height:"100%",display:"block",pointerEvents:"none"}}/>

          {/* Layer 4 – coin popups */}
          <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"visible"}}>
            {popups.map(p=>(
              <div key={p.id} style={{
                position:"absolute",
                left:`${(p.cx/300)*100}%`,
                top:`${(p.cy/300)*100}%`,
                transform:"translateX(-50%)",
                fontFamily:"'Press Start 2P',monospace",
                fontSize:10,
                color:p.color,
                textShadow:"1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000",
                whiteSpace:"nowrap",pointerEvents:"none",
              }}>{p.text}💰</div>
            ))}
          </div>

          {/* Layer 5 – win/lose banner (centred in grid) */}
          {winBanner&&(
            <div style={{
              position:"absolute",left:0,right:0,top:"50%",transform:"translateY(-50%)",
              display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none",
            }}>
              <div style={{
                background:"rgba(0,0,0,0.92)",border:`2px solid ${winBanner.color}`,
                padding:"8px 16px",fontFamily:"'Press Start 2P',monospace",
                fontSize:card.win>0?12:9,color:winBanner.color,letterSpacing:2,
                animation:"popIn 0.25s ease-out",
              }}>{winBanner.text}</div>
            </div>
          )}
        </div>

        {/* FOOTER — always visible */}
        <div style={{background:pal.acc,borderTop:`2px solid ${bc}`,padding:"4px 10px",
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,color:bc,opacity:0.75}}>
            {card.isElite?"★ ELITE":`FL.${card.floor||1}`}
          </span>
          <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,
            color:revealed?(card.win>0?C.green:C.muted):(card.peekWin!==null?C.cyan:bc)}}>
            {revealed
              ?(card.win>0?`WIN +${card.win}💰`:"NO WIN")
              :(card.peekWin!==null?(card.peekWin>0?`PEEK +${card.peekWin}💰`:"PEEK: LOSE"):"?? ?? ??")}
          </span>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{width:cardW,height:5,background:C.bg3,border:`1px solid ${C.line}`,flexShrink:0}}>
        <div style={{height:"100%",background:card.theme.color,width:`${Math.min(pct,100)}%`,transition:"width 0.12s"}}/>
      </div>
      <div style={{fontSize:7,color:C.muted,letterSpacing:2,flexShrink:0}}>
        {revealed?(card.win>0?"WINNER! CLAIM YOUR PRIZE":"BETTER LUCK NEXT TIME"):"SCRATCH TO REVEAL"}
      </div>

      {/* Buttons */}
      <div style={{display:"flex",gap:8,width:cardW,paddingBottom:8,flexShrink:0}}>
        {!revealed&&(
          <button onClick={autoReveal}
            style={{flex:1,background:freeReveals>0?C.purple:C.bg3,color:freeReveals>0?"#fff":C.muted,
              fontFamily:"'Press Start 2P',monospace",fontSize:6,padding:"11px 4px",
              border:`1px solid ${freeReveals>0?C.purple:C.line}`,cursor:freeReveals>0?"pointer":"default",letterSpacing:1}}>
            {freeReveals>0?`AUTO (${freeReveals})`:"AUTO REVEAL"}
          </button>
        )}
        {!revealed&&(
          <button onClick={onBack}
            style={{flex:1,background:C.bg3,color:C.muted,fontFamily:"'Press Start 2P',monospace",
              fontSize:6,padding:"11px 4px",border:`1px solid ${C.line}`,cursor:"pointer",letterSpacing:1}}>
            🏃 FLEE
          </button>
        )}
        {showContinue&&(
          <button onClick={handleContinue}
            style={{flex:2,background:C.gold,color:"#000",fontFamily:"'Press Start 2P',monospace",
              fontSize:8,padding:"13px 8px",border:`2px solid ${C.gold2}`,cursor:"pointer",
              letterSpacing:1,boxShadow:`3px 3px 0 ${C.gold2}`}}>
            CONTINUE →
          </button>
        )}
      </div>

      <style>{`
        @keyframes popIn{from{transform:translateX(-50%) scale(0.4);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
        @keyframes bannerIn{from{transform:translateY(calc(-50% + 10px));opacity:0}to{transform:translateY(-50%);opacity:1}}
        @keyframes cardShake{
          0%{transform:translate(0,0) rotate(0deg)}
          15%{transform:translate(-6px,-3px) rotate(-1.5deg)}
          30%{transform:translate(6px,2px) rotate(1.5deg)}
          45%{transform:translate(-4px,-2px) rotate(-1deg)}
          60%{transform:translate(4px,1px) rotate(0.8deg)}
          75%{transform:translate(-2px,0) rotate(-0.4deg)}
          100%{transform:translate(0,0) rotate(0deg)}
        }
      `}</style>
    </div>
  );
}

// Determine which grid cells are part of the win — reuses evalGrid
function getWinIndices(card){
  if(!card.winType||card.win<=0) return [];
  const result=evalGrid(card.grid, card.theme, 1); // base=1, we only need the indices
  return result ? (result.winIdx||[]) : [];
}

// ══════════════════════════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════════════════════════
const SAVE_KEY = "sr_save_v1";

// Serialize run state + screen to localStorage
function saveRun(gs, screen, activeNode, selClassId, selDiffId){
  if(!gs) return;
  try {
    const payload = {
      gs, screen, activeNode,
      selClassId, selDiffId,
      savedAt: Date.now(),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
  } catch(e){ console.warn("Save failed", e); }
}

function loadRun(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    const d = JSON.parse(raw);
    // Validate it has the fields we need
    if(!d.gs||!d.screen||!d.selClassId) return null;
    // Rehydrate relic apply functions (they're stripped by JSON.stringify)
    if(d.gs.relics){
      d.gs.relics = d.gs.relicIds.map(id=>RELICS.find(r=>r.id===id)).filter(Boolean);
    }
    return d;
  } catch(e){ return null; }
}

function clearSave(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
}

// ══════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState("title"); // title | setup | map | scratch | result | reward | shop | encounter | gameover | victory
  const [selClass,setSelClass]=useState(CLASSES[0]);
  const [selDiff,setSelDiff]=useState(DIFFICULTIES[1]);
  const [gs,setGs]=useState(null); // game state
  const [activeNode,setActiveNode]=useState(null);
  const activeNodeRef=useRef(null); // always-fresh ref for async callbacks
  const [currentCard,setCurrentCard]=useState(null);
  const [encData,setEncData]=useState(null);
  const [shopItems,setShopItems]=useState([]);
  const [rewardRelics,setRewardRelics]=useState([]);
  const [toast,setToast]=useState(null);
  const [highScores,setHighScores]=useState(()=>{try{return JSON.parse(localStorage.getItem("sr_hs")||"[]");}catch{return[];}});
  const [hasSave,setHasSave]=useState(()=>!!loadRun());
  const [saveIndicator,setSaveIndicator]=useState(false);
  const [floorTransition,setFloorTransition]=useState(null);
  const [showGlossary,setShowGlossary]=useState(false);
  const [bossIntro,setBossIntro]=useState(false); // fullscreen boss warning overlay
  const appRef=useRef(null);

  const showToast=(msg,good=true)=>{
    setToast({msg,good,id:Date.now()});
    setTimeout(()=>setToast(null),1400);
  };

  // ─── Save helpers ───
  const triggerSave=useCallback((gsOverride,screenOverride,nodeOverride)=>{
    const g=gsOverride||gs;
    const sc=screenOverride||screen;
    const node=nodeOverride!==undefined?nodeOverride:activeNode;
    saveRun(g, sc, node, selClass.id, selDiff.id);
    setHasSave(true);
    setSaveIndicator(true);
    setTimeout(()=>setSaveIndicator(false),1200);
  },[gs,screen,activeNode,selClass,selDiff]);

  const resumeRun=()=>{
    const d=loadRun();
    if(!d){ showToast("No save found",false); return; }
    const cls=CLASSES.find(c=>c.id===d.selClassId)||CLASSES[0];
    const diff=DIFFICULTIES.find(d2=>d2.id===d.selDiffId)||DIFFICULTIES[1];
    setSelClass(cls); setSelDiff(diff);
    // Repair map before restoring — fixes any stuck locked rows from mid-scratch saves
    const loadedGs=d.gs;
    if(loadedGs&&loadedGs.nodeMap) repairMapState(loadedGs);
    setGs(loadedGs);
    setActiveNode(d.activeNode||null);
    // Never restore to scratch screen — always go to map so player re-enters cleanly
    const safeScreen=(d.screen==="scratch"||(d.screen&&!["map","shop","encounter","reward","gameover","victory"].includes(d.screen)))?"map":d.screen;
    // If map but floor is complete, go straight to reward
    if(safeScreen==="map"&&loadedGs.nodeMap){
      const last=loadedGs.nodeMap[loadedGs.nodeMap.length-1];
      if(last&&last.every(n=>n.state==="completed")){
        setTimeout(()=>prepareReward(loadedGs),100);
        showToast("Run resumed!",true);
        return;
      }
    }
    go(safeScreen);
    showToast("Run resumed!",true);
  };

  const go=useCallback((targetScreen)=>{
    if(targetScreen==="map"){
      // Repair locked rows AND check if floor is already complete (resume edge case)
      setGs(prev=>{
        if(!prev||!prev.nodeMap) return prev;
        const s={...prev, nodeMap:prev.nodeMap.map(r=>[...r])};
        repairMapState(s);
        const last=s.nodeMap[s.nodeMap.length-1];
        const allDone=last.every(n=>n.state==="completed");
        if(allDone){
          // Floor is fully complete — go to reward instead of showing dead map
          setTimeout(()=>prepareReward(s), 50);
          return s;
        }
        return s;
      });
      // Only actually navigate to map if floor isn't complete
      // (prepareReward will navigate to reward if needed — we still setScreen
      // to map here; prepareReward will immediately override it)
    }
    setScreen(targetScreen);
  },[]);

  // ─── Start run ───
  const beginRun=()=>{
    const s=newState(selClass,selDiff);
    s.nodeMap=genMap(s.floor,s.extraNodes||0);
    s.coins+=s.floorBonus||0;
    setGs(s);
    clearSave(); // fresh run clears old save
    setTimeout(()=>saveRun(s,"map",null,selClass.id,selDiff.id),50);
    setHasSave(true);
    go("map");
  };

  const updateGs=useCallback((fn)=>{
    setGs(prev=>{const next={...prev};fn(next);return next;});
  },[]);

  // ─── Map ───
  const enterNode=(node)=>{
    setActiveNode(node);
    activeNodeRef.current=node;
    updateGs(s=>{ const n=s.nodeMap[node.row].find(n=>n.id===node.id); if(n) n.state="completed"; });
    if(node.type==="scratch"||node.type==="elite"||node.type==="boss"){
      // Use setGs functional form to get fresh state for genCard
      setGs(prev=>{
        const card=genCard(prev,node.type);
        setCurrentCard(card);
        return prev;
      });
      setTimeout(()=>triggerSave(null,"map",node),60);
      if(node.type==="boss"){
        // Show boss warning overlay, then go to scratch after 2.5s
        setBossIntro(true);
        setTimeout(()=>{ setBossIntro(false); go("scratch"); },2500);
      } else {
        go("scratch");
      }
    } else if(node.type==="shop"){
      setShopItems(shuffle(SHOP_POOL).slice(0,4));
      setTimeout(()=>triggerSave(null,"shop",node),60);
      go("shop");
    } else if(node.type==="encounter"){
      setEncData(ENCOUNTERS[Math.floor(Math.random()*ENCOUNTERS.length)]);
      setTimeout(()=>triggerSave(null,"encounter",node),60);
      go("encounter");
    } else if(node.type==="rest"){
      updateGs(s=>{const r=Math.min(2,s.maxHp-s.hp);s.hp+=r;});
      showToast("Rested. HP restored!",true);
      setTimeout(()=>afterNode(node),800);
    }
  };

  const unlockNextRow=(s,node)=>{
    const nr=node.row+1;
    if(nr<s.nodeMap.length) s.nodeMap[nr].forEach(n=>n.state="available");
  };

  // Scan entire map and unlock any row whose previous row is fully completed
  // but whose own nodes are still locked. Fixes flee/resume stuck states.
  const repairMapState=(s)=>{
    for(let r=1;r<s.nodeMap.length;r++){
      const prevRow=s.nodeMap[r-1];
      const thisRow=s.nodeMap[r];
      const prevDone=prevRow.every(n=>n.state==="completed");
      const thisLocked=thisRow.every(n=>n.state==="locked");
      if(prevDone&&thisLocked){
        thisRow.forEach(n=>n.state="available");
      }
    }
  };

  const afterNode=(node)=>{
    setGs(prev=>{
      const s={...prev};
      unlockNextRow(s,node||activeNode);
      const last=s.nodeMap[s.nodeMap.length-1];
      const allDone=last.every(n=>n.state==="completed");
      setTimeout(()=>{
        if(allDone){ prepareReward(s); }
        else { go("map"); }
      },50);
      return s;
    });
  };

  // simpler version: compute next screen after updating state
  const finishNode=(updatedS, node)=>{
    const s={...updatedS};
    const nodeToUse=node||activeNode;
    unlockNextRow(s,nodeToUse);
    const last=s.nodeMap[s.nodeMap.length-1];
    const allDone=last.every(n=>n.state==="completed");
    setGs(s);
    if(s.hp<=0){ setTimeout(()=>go("gameover"),400); return; }
    if(allDone){ prepareReward(s); }
    else { go("map"); }
  };

  // ─── Scratch result ───
  const onCardReveal=(win,winType)=>{
    // Update game state synchronously so we can read it immediately
    let nextState = null;
    setGs(prev=>{
      const s={...prev};
      s.totalScratches++;
      s.scratchesThisFloor++;
      if(s.bombActive&&!s.bombUsed) s.bombUsed=true;
      s.guaranteedWin=false;
      if(win>0){
        s.coins+=win; s.totalCoins+=win; s.wins++;
        if(s.healOnWin) s.hp=Math.min(s.maxHp,s.hp+1);
      } else {
        const rawDmg=Math.max(0,1-(s.damageReduce||0));
        const dmg=Math.max(0,Math.floor(rawDmg*(s.damageMult||1)));
        if(s.shielded){ s.shielded=false; }
        else { s.hp=Math.max(0,s.hp-dmg); }
      }
      // Unlock next row while we have the state
      const node=activeNodeRef.current;
      if(node) unlockNextRow(s,node);
      nextState=s;
      return s;
    });
    // Navigate after state update — use setTimeout so setGs flush lands first
    setTimeout(()=>{
      if(!nextState) return;
      if(nextState.hp<=0){
        clearSave(); // run over
        go("gameover"); return;
      }
      const last=nextState.nodeMap[nextState.nodeMap.length-1];
      if(last.every(n=>n.state==="completed")){
        saveRun(nextState,"reward",activeNodeRef.current,selClass.id,selDiff.id);
        prepareReward(nextState);
      } else {
        saveRun(nextState,"map",null,selClass.id,selDiff.id);
        go("map");
      }
    },80);
  };

  // continueFromResult removed — card handles navigation directly

  // ─── Reward (relic pick) ───
  const prepareReward=(s)=>{
    const avail=RELICS.filter(r=>!(s.relicIds||[]).includes(r.id));
    setRewardRelics(shuffle(avail).slice(0,3));
    go("reward");
  };

  const pickRelic=(relic)=>{
    updateGs(s=>{
      if(!s.relicIds.includes(relic.id)){s.relicIds.push(relic.id);s.relics.push(relic);relic.apply(s);}
    });
    advanceFloor();
    setTimeout(()=>triggerSave(),100);
  };

  const advanceFloor=()=>{
    let nextGs=null;
    setGs(prev=>{
      const s={...prev};
      s.floor++;
      s.scratchesThisFloor=0;
      s.bombUsed=false;
      if(s.floor>s.maxFloor){
        setTimeout(()=>{ clearSave(); go("victory"); },50);
        return s;
      }
      s.nodeMap=genMap(s.floor,s.extraNodes||0);
      s.coins+=(s.floorBonus||0);
      nextGs=s;
      return s;
    });
    // Show floor transition overlay, then navigate
    setTimeout(()=>{
      if(!nextGs) return;
      saveRun(nextGs,"map",null,selClass.id,selDiff.id);
      setFloorTransition({floor:nextGs.floor, name:FLOOR_NAMES[nextGs.floor-1]||"THE DEPTHS"});
      SFX.floorClear();
      setTimeout(()=>{
        setFloorTransition(null);
        go("map");
      },2000);
    },80);
  };

  // ─── Shop ───
  const buyItem=(item)=>{
    const cost=Math.floor(item.cost*(1-(gs.shopDiscount||0)));
    if(gs.coins<cost){showToast("Not enough coins!",false);return;}
    updateGs(s=>{s.coins-=cost;item.fn(s);});
    showToast(item.icon+" Purchased!",true);
    setShopItems(prev=>prev.filter(i=>i.id!==item.id));
    setTimeout(()=>triggerSave(),60);
  };

  const leaveShop=()=>{ finishNode(gs,activeNode); };

  // ─── Encounter ───
  const chooseEncounter=(choice)=>{
    let msg="...";
    let capturedS=null;
    setGs(prev=>{
      const s={...prev};
      msg=choice.fn(s)||"...";
      capturedS=s;
      return s;
    });
    setTimeout(()=>{
      showToast(msg,choice.good);
      if(capturedS) finishNode(capturedS,activeNode);
    },60);
  };

  // ─── Save score ───
  const saveScore=useCallback(()=>{
    if(!gs) return;
    const hs=[...highScores,{coins:gs.totalCoins,floor:gs.floor,cls:selClass.name,ts:Date.now()}];
    hs.sort((a,b)=>b.coins-a.coins);
    const top=hs.slice(0,8);
    setHighScores(top);
    try{localStorage.setItem("sr_hs",JSON.stringify(top));}catch{}
  },[gs,highScores,selClass]);

  useEffect(()=>{
    if(screen==="gameover"||screen==="victory"){
      saveScore();
      clearSave(); // run is over, no need to resume
      setHasSave(false);
    }
  },[screen]);

  // ── RENDER HELPERS ──
  const Btn=({children,onClick,color=C.bg3,textColor=C.text,style={},...p})=>(
    <button onClick={()=>{SFX.click();onClick&&onClick();}} {...p} style={{
      background:color,color:textColor,fontFamily:"'Press Start 2P',monospace",
      fontSize:8,padding:"14px 10px",border:`2px solid ${color===C.bg3?C.line:color}`,
      cursor:"pointer",letterSpacing:1,width:"100%",
      boxShadow:color!==C.bg3?`3px 3px 0 rgba(0,0,0,0.5)`:"none",
      ...style
    }}>{children}</button>
  );

  const RelicsBar=()=>(
    <div style={{display:"flex",gap:4,padding:"6px 8px",background:C.bg1,borderBottom:`2px solid ${C.line}`,minHeight:38,overflowX:"auto",flexShrink:0,alignItems:"center"}}>
      {(!gs||gs.relics.length===0)
        ? <span style={{fontSize:7,color:C.muted,letterSpacing:2,padding:"4px 0"}}>NO RELICS</span>
        : gs.relics.map(r=>(
            <div key={r.id} title={r.name+": "+r.desc}
              style={{width:26,height:26,background:C.bg3,border:`1px solid ${RARITY_COLORS[r.rarity]}`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0,cursor:"default"}}>
              {r.icon}
            </div>
          ))
      }
      <button onClick={()=>{SFX.click();setShowGlossary(true);}}
        style={{marginLeft:"auto",flexShrink:0,background:"transparent",border:`1px solid ${C.line}`,
          color:C.muted,fontFamily:"'Press Start 2P',monospace",fontSize:6,padding:"4px 6px",
          cursor:"pointer",letterSpacing:1}}>
        📖
      </button>
    </div>
  );

  const RunStats=()=>gs&&(
    <div style={{display:"flex",gap:8,padding:10,background:C.bg1,border:`1px solid ${C.line}`,marginBottom:14,flexShrink:0}}>
      {[["coins",gs.coins+"💰","COINS"],["hp",gs.hp+"/"+gs.maxHp+"❤️","HP"],["floor",gs.floor+"/"+gs.maxFloor,"FLOOR"],["scratches",gs.totalScratches,"SCRATCHED"]].map(([k,v,l])=>(
        <div key={k} style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:10,color:k==="hp"?C.red:C.gold,marginBottom:2}}>{v}</div>
          <div style={{fontSize:5,color:C.muted,letterSpacing:1}}>{l}</div>
        </div>
      ))}
    </div>
  );

  // ══ SCREENS ══
  const S={
    // ─ TITLE ─
    title:(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,gap:0,position:"relative",overflow:"hidden",background:C.bg0}}>
        {/* CRT scanlines */}
        <div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px)",pointerEvents:"none",zIndex:10}}/>
        {/* Ambient glow blobs */}
        <div style={{position:"absolute",top:"15%",left:"10%",width:120,height:120,background:C.gold,opacity:0.04,borderRadius:"50%",filter:"blur(40px)"}}/>
        <div style={{position:"absolute",bottom:"20%",right:"5%",width:160,height:160,background:C.purple,opacity:0.05,borderRadius:"50%",filter:"blur(50px)"}}/>
        {/* Content */}
        <div style={{textAlign:"center",padding:"0 20px",zIndex:20}}>
          {/* Mini scratch card art */}
          <div style={{display:"inline-grid",gridTemplateColumns:"repeat(3,28px)",gridTemplateRows:"repeat(3,28px)",gap:3,marginBottom:20,border:`3px solid ${C.gold}`,padding:6,background:"#1a0a00"}}>
            {[..."🍒🍒🍒🍋🍊🍇🍉⭐🍊"].map((c,i)=>(
              <div key={i} style={{background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,border:`1px solid ${C.gold2}`}}>{c}</div>
            ))}
          </div>
          <div style={{fontSize:26,color:C.gold,fontFamily:"'Press Start 2P',monospace",textShadow:`4px 4px 0 ${C.gold2},0 0 30px ${C.gold}66`,lineHeight:1.4,marginBottom:6,letterSpacing:2,animation:"titleFlicker 4s infinite"}}>
            SCRATCH<br/>ROGUE
          </div>
          <div style={{fontSize:7,color:C.muted,letterSpacing:3,marginBottom:32,fontFamily:"'Press Start 2P',monospace"}}>A ROGUELIKE SCRATCHING GAME</div>
          <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
            {hasSave&&(
              <button onClick={resumeRun} style={{
                width:210,padding:"14px 0",background:C.cyan,color:"#000",
                fontFamily:"'Press Start 2P',monospace",fontSize:8,
                border:`2px solid #208888`,cursor:"pointer",letterSpacing:1,
                boxShadow:`3px 3px 0 #104444`,marginBottom:2,
              }}>▶ RESUME RUN</button>
            )}
            <Btn onClick={()=>{clearSave();setHasSave(false);go("setup");}} color={C.gold} textColor="#000" style={{width:210,fontSize:8,letterSpacing:1}}>
              {hasSave?"✦ NEW RUN":"▶ NEW RUN"}
            </Btn>
            <button onClick={()=>{
              if(highScores.length===0){showToast("No records yet!",false);return;}
              const top=highScores.slice(0,5).map((h,i)=>`${i+1}. ${h.coins}💰 FL${h.floor} (${h.cls})`).join("\n");
              alert("── HIGH SCORES ──\n"+top);
            }} style={{width:210,padding:"10px 0",background:"transparent",border:`1px solid ${C.line}`,color:C.muted,fontFamily:"'Press Start 2P',monospace",fontSize:7,cursor:"pointer",letterSpacing:1}}>
              📋 RECORDS
            </button>
          </div>
        </div>
        <div style={{position:"absolute",bottom:14,fontSize:6,color:C.muted,letterSpacing:2,fontFamily:"'Press Start 2P',monospace"}}>SCRATCH ✦ RELIC ✦ SURVIVE</div>
        <style>{`@keyframes titleFlicker{0%,95%,100%{opacity:1}96%{opacity:0.7}97%{opacity:1}98.5%{opacity:0.5}99%{opacity:1}}`}</style>
      </div>
    ),

    // ─ SETUP ─
    setup:(
      <div style={{overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:14}}>
        <div style={{fontSize:9,color:C.gold,letterSpacing:2,textAlign:"center",padding:"4px 0"}}>CHOOSE YOUR CLASS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {CLASSES.map(cls=>(
            <div key={cls.id} onClick={()=>setSelClass(cls)} style={{background:C.bg2,border:`2px solid ${selClass.id===cls.id?C.gold:C.line}`,padding:"12px 10px",cursor:"pointer",textAlign:"center",transition:"border-color 0.15s"}}>
              <div style={{fontSize:28,marginBottom:6}}>{cls.icon}</div>
              <div style={{fontSize:7,color:C.text,marginBottom:4}}>{cls.name}</div>
              <div style={{fontSize:11,color:C.muted,fontFamily:"'VT323',monospace",lineHeight:1.5}}>{cls.desc}</div>
            </div>
          ))}
        </div>
        <div style={{fontSize:7,color:C.muted,letterSpacing:2}}>DIFFICULTY</div>
        <div style={{display:"flex",gap:8}}>
          {DIFFICULTIES.map(d=>(
            <button key={d.id} onClick={()=>setSelDiff(d)} style={{flex:1,padding:"10px 4px",background:C.bg2,border:`2px solid ${selDiff.id===d.id?d.color:C.line}`,color:selDiff.id===d.id?d.color:C.muted,fontFamily:"'Press Start 2P',monospace",fontSize:6,cursor:"pointer",letterSpacing:1}}>
              {d.name}<br/><span style={{fontFamily:"'VT323',monospace",fontSize:13,color:C.muted}}>{d.desc}</span>
            </button>
          ))}
        </div>
        <Btn onClick={beginRun} color={C.gold} textColor="#000">BEGIN RUN →</Btn>
        <Btn onClick={()=>go("title")} style={{background:"transparent",border:`1px solid ${C.line}`,color:C.muted}}>← BACK</Btn>
      </div>
    ),

    // ─ MAP ─
    map: gs&&(
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <RelicsBar/>
        <div style={{overflowY:"auto",flex:1,padding:12}}>
          <RunStats/>
          <div style={{textAlign:"center",marginBottom:14}}>
            <div style={{fontSize:8,color:C.gold,letterSpacing:2}}>FLOOR {gs.floor} — {FLOOR_NAMES[gs.floor-1]||"THE DEPTHS"}</div>
            <div style={{fontSize:12,color:C.muted,fontFamily:"'VT323',monospace",marginTop:3}}>Choose your path through the dungeon.</div>
          </div>
          <div style={{display:"flex",flexDirection:"column-reverse",gap:0,alignItems:"center"}}>
            {gs.nodeMap.map((row,ri)=>(
              <div key={ri} style={{width:"100%"}}>
                {/* Connector lines up from this row */}
                {ri<gs.nodeMap.length-1&&(
                  <div style={{display:"flex",justifyContent:"center",height:16,position:"relative"}}>
                    {row.map(node=>(
                      <div key={node.id+"_line"} style={{
                        position:"absolute",
                        width:2,
                        height:"100%",
                        background:node.state==="completed"?C.green:C.line,
                        left:`calc(${(node.col+0.5)/row.length*100}%)`,
                        transform:"translateX(-50%)",
                      }}/>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",justifyContent:"center",gap:12,padding:"2px 0"}}>
                  {row.map(node=>{
                    const icons={scratch:"🎴",elite:"⚡",shop:"🏪",encounter:"❓",rest:"🔥",boss:"☠"};
                    const labels={scratch:"SCRATCH",elite:"ELITE",shop:"SHOP",encounter:"EVENT",rest:"REST",boss:"BOSS"};
                    const nodeColors={scratch:C.gold,elite:"#ffff40",shop:C.cyan,encounter:C.purple,rest:C.green,boss:"#ff4040"};
                    const isAvail=node.state==="available";
                    const isDone=node.state==="completed";
                    const nc=nodeColors[node.type]||C.gold;
                    return(
                      <div key={node.id} onClick={isAvail?()=>enterNode(node):undefined}
                        style={{
                          width:58,height:58,
                          background:isDone?C.bg1:isAvail?C.bg3:C.bg2,
                          border:`2px solid ${isDone?C.green:isAvail?nc:C.line}`,
                          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                          cursor:isAvail?"pointer":"default",
                          opacity:isDone?0.4:node.state==="locked"?0.25:1,
                          transition:"all 0.15s",flexShrink:0,
                          boxShadow:isAvail?`0 0 12px ${nc}55, inset 0 0 8px ${nc}11`:"none",
                          animation:isAvail?"nodePulse 1.8s ease-in-out infinite":"none",
                        }}>
                        <span style={{fontSize:24,lineHeight:1}}>{isDone?"✓":icons[node.type]}</span>
                        <span style={{fontSize:5,color:isAvail?nc:isDone?C.green:C.muted,letterSpacing:1,marginTop:3,fontFamily:"'Press Start 2P',monospace"}}>
                          {isDone?"DONE":labels[node.type]}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
          <style>{`@keyframes nodePulse{0%,100%{box-shadow:0 0 6px var(--nc,#f0c040)44}50%{box-shadow:0 0 18px var(--nc,#f0c040)88}}`}</style>
          <div style={{height:16}}/>
        </div>
      </div>
    ),

    // ─ SCRATCH ─
    scratch: gs&&currentCard&&(
      <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
        {/* Slim status bar: HP pips + coins + relics */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"6px 12px",background:C.bg1,borderBottom:`2px solid ${C.line}`,flexShrink:0}}>
          <div style={{display:"flex",gap:3}}>
            {Array.from({length:gs.maxHp},(_,i)=>(
              <div key={i} style={{width:10,height:10,background:i<gs.hp?C.red:C.bg3,border:`1px solid ${i<gs.hp?C.red:C.line}`}}/>
            ))}
          </div>
          <div style={{fontSize:8,color:C.gold,marginLeft:"auto"}}>{gs.coins}💰</div>
          <div style={{display:"flex",gap:3}}>
            {gs.relics.slice(0,5).map(r=>(
              <div key={r.id} title={r.name} style={{width:22,height:22,background:C.bg3,border:`1px solid ${RARITY_COLORS[r.rarity]}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>
                {r.icon}
              </div>
            ))}
            {gs.relics.length>5&&<div style={{fontSize:7,color:C.muted,alignSelf:"center"}}>+{gs.relics.length-5}</div>}
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",display:"flex",justifyContent:"center"}}>
          <ScratchCardView card={currentCard} freeReveals={gs.freeReveals||0}
            onReveal={onCardReveal} onBack={()=>{
              // Unlock the next row (node was already marked completed on enter)
              // then repair any stuck rows before navigating
              updateGs(s=>{
                const node=activeNodeRef.current;
      if(node) unlockNextRow(s,node);
                repairMapState(s);
              });
              showToast("Fled the scratch!",false);
              setTimeout(()=>go("map"),60);
            }}/>
        </div>
      </div>
    ),



    // ─ REWARD ─
    reward:(
      <div style={{overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:14}}>
        <RelicsBar/>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:10,color:C.gold,marginBottom:4}}>FLOOR CLEARED!</div>
          <div style={{fontSize:12,color:C.muted,fontFamily:"'VT323',monospace"}}>Choose a relic to carry into the next floor.</div>
        </div>
        {gs&&<div style={{background:C.bg2,border:`2px solid ${C.gold2}`,padding:14,textAlign:"center"}}>
          <div style={{fontSize:18,color:C.gold}}>{gs.totalCoins}💰</div>
          <div style={{fontSize:6,color:C.muted,marginTop:3}}>TOTAL COINS EARNED</div>
        </div>}
        <div style={{fontSize:8,color:C.gold,letterSpacing:2}}>CHOOSE A RELIC</div>
        {rewardRelics.map(r=>(
          <div key={r.id} onClick={()=>pickRelic(r)}
            style={{background:C.bg2,border:`2px solid ${RARITY_COLORS[r.rarity]}`,padding:14,cursor:"pointer",display:"flex",gap:12,alignItems:"center",transition:"all 0.15s"}}>
            <span style={{fontSize:28,flexShrink:0}}>{r.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:6,color:RARITY_COLORS[r.rarity],letterSpacing:1,marginBottom:4,border:`1px solid ${RARITY_COLORS[r.rarity]}`,display:"inline-block",padding:"2px 6px"}}>{r.rarity.toUpperCase()}</div>
              <div style={{fontSize:8,color:C.text,marginBottom:3}}>{r.name}</div>
              <div style={{fontSize:12,color:C.muted,fontFamily:"'VT323',monospace"}}>{r.desc}</div>
            </div>
          </div>
        ))}
        <button onClick={advanceFloor} style={{background:"transparent",border:`1px solid ${C.line}`,color:C.muted,fontFamily:"'Press Start 2P',monospace",fontSize:7,padding:12,cursor:"pointer",width:"100%",letterSpacing:1}}>
          SKIP — TAKE NO RELIC
        </button>
      </div>
    ),

    // ─ SHOP ─
    shop: gs&&(
      <div style={{overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
        <RelicsBar/>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:10,color:C.gold}}>THE EMPORIUM</div>
          <div style={{fontSize:12,color:C.muted,fontFamily:"'VT323',monospace",marginTop:3}}>No refunds in the depths.</div>
        </div>
        <div style={{background:C.bg2,border:`1px solid ${C.line}`,padding:10,textAlign:"center",fontSize:8,color:C.gold}}>
          YOUR COINS: {gs.coins}💰{gs.shopDiscount>0&&<span style={{fontSize:7,color:C.green}}> ({Math.floor(gs.shopDiscount*100)}% OFF)</span>}
        </div>
        {shopItems.map(item=>{
          const cost=Math.floor(item.cost*(1-(gs.shopDiscount||0)));
          const can=gs.coins>=cost;
          return(
            <div key={item.id} onClick={can?()=>buyItem(item):undefined}
              style={{background:C.bg2,border:`2px solid ${can?C.line:C.bg3}`,padding:12,display:"flex",alignItems:"center",gap:12,cursor:can?"pointer":"default",opacity:can?1:0.5,transition:"all 0.15s"}}>
              <span style={{fontSize:24,flexShrink:0}}>{item.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:8,color:C.text,marginBottom:2}}>{item.name}</div>
                <div style={{fontSize:12,color:C.muted,fontFamily:"'VT323',monospace"}}>{item.desc}</div>
              </div>
              <div style={{fontSize:9,color:can?C.gold:C.muted,flexShrink:0}}>{cost}💰</div>
            </div>
          );
        })}
        <Btn onClick={leaveShop} style={{marginTop:4}}>LEAVE SHOP →</Btn>
      </div>
    ),

    // ─ ENCOUNTER ─
    encounter: encData&&(
      <div style={{overflowY:"auto",padding:16,display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
        <RelicsBar/>
        <div style={{fontSize:52,marginTop:8}}>{encData.icon}</div>
        <div style={{fontSize:9,color:C.gold,textAlign:"center"}}>{encData.title}</div>
        <div style={{fontSize:14,color:C.text,textAlign:"center",lineHeight:1.6,fontFamily:"'VT323',monospace",maxWidth:340}}>{encData.desc}</div>
        {encData.choices.map((c,i)=>(
          <div key={i} onClick={()=>chooseEncounter(c)}
            style={{background:C.bg2,border:`2px solid ${C.line}`,padding:14,cursor:"pointer",width:"100%",transition:"all 0.15s"}}>
            <div style={{fontSize:8,color:C.text,marginBottom:4}}>{c.title}</div>
            <div style={{fontSize:12,color:c.good?C.green:C.red,fontFamily:"'VT323',monospace"}}>{c.effect}</div>
          </div>
        ))}
      </div>
    ),

    // ─ GAME OVER ─
    gameover:(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,gap:14,padding:20}}>
        <div style={{fontSize:52}}>💀</div>
        <div style={{fontSize:14,color:C.red,textShadow:"3px 3px 0 #800"}}>GAME OVER</div>
        <div style={{fontSize:8,color:C.muted,letterSpacing:2}}>YOUR RUN ENDS HERE</div>
        {gs&&<div style={{background:C.bg2,border:`2px solid ${C.line}`,padding:16,width:"100%",maxWidth:280}}>
          {[["FLOOR",`${gs.floor}/${gs.maxFloor}`],["SCRATCHES",gs.totalScratches],["WINS",gs.wins],["COINS EARNED",gs.totalCoins+"💰"],["RELICS",gs.relics.length]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.line}`}}>
              <span style={{fontSize:7,color:C.muted}}>{k}</span>
              <span style={{fontSize:7,color:C.text}}>{v}</span>
            </div>
          ))}
        </div>}
        <Btn onClick={()=>go("setup")} color={C.gold} textColor="#000" style={{maxWidth:240}}>TRY AGAIN →</Btn>
        <Btn onClick={()=>go("title")} style={{maxWidth:240,background:"transparent",border:`1px solid ${C.line}`,color:C.muted}}>TITLE SCREEN</Btn>
      </div>
    ),

    // ─ VICTORY ─
    victory:(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,gap:14,padding:20,textAlign:"center"}}>
        <div style={{fontSize:52}}>🏆</div>
        <div style={{fontSize:12,color:C.gold,textShadow:`3px 3px 0 ${C.gold2}`}}>YOU WIN!</div>
        <div style={{fontSize:8,color:C.muted,letterSpacing:2}}>THE DEPTHS CONQUERED</div>
        {gs&&<div style={{fontSize:16,color:C.gold}}>{gs.totalCoins}💰 TOTAL</div>}
        {gs&&<div style={{background:C.bg2,border:`2px solid ${C.line}`,padding:16,width:"100%",maxWidth:280}}>
          {[["FLOOR",`${gs.maxFloor}/${gs.maxFloor} ✓`],["SCRATCHES",gs.totalScratches],["WINS",gs.wins],["RELICS",gs.relics.length],["CLASS",selClass.name]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.line}`}}>
              <span style={{fontSize:7,color:C.muted}}>{k}</span>
              <span style={{fontSize:7,color:C.text}}>{v}</span>
            </div>
          ))}
        </div>}
        <Btn onClick={()=>go("setup")} color={C.gold} textColor="#000" style={{maxWidth:240}}>NEW RUN →</Btn>
        <Btn onClick={()=>go("title")} style={{maxWidth:240,background:"transparent",border:`1px solid ${C.line}`,color:C.muted}}>TITLE</Btn>
      </div>
    ),
  };

  return(
    <div ref={appRef} style={{width:"100%",maxWidth:430,height:"100dvh",margin:"0 auto",background:C.bg0,color:C.text,fontFamily:"'Press Start 2P',monospace",display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
      {/* Google fonts */}
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}body{background:${C.bg0};}::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:${C.bg0};}::-webkit-scrollbar-thumb{background:${C.line};}`}</style>
      {/* Save indicator */}
      {saveIndicator&&(
        <div style={{
          position:"absolute",top:8,right:8,
          background:C.bg3,border:`1px solid ${C.green}`,
          color:C.green,fontFamily:"'Press Start 2P',monospace",
          fontSize:6,padding:"4px 8px",zIndex:1001,letterSpacing:1,
          opacity:saveIndicator?1:0,transition:"opacity 0.3s",
        }}>💾 SAVED</div>
      )}
      {/* Toast */}
      {toast&&(
        <div key={toast.id} style={{position:"absolute",top:60,left:"50%",transform:"translateX(-50%)",background:toast.good?C.gold:C.red,color:toast.good?"#000":"#fff",fontFamily:"'Press Start 2P',monospace",fontSize:8,padding:"8px 14px",zIndex:1000,letterSpacing:1,boxShadow:"3px 3px 0 rgba(0,0,0,0.5)",whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}
      {/* Floor transition overlay */}
      {floorTransition&&(
        <div style={{
          position:"absolute",inset:0,zIndex:2000,
          background:C.bg0,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          gap:16,
          animation:"floorIn 0.4s ease-out",
        }}>
          <div style={{fontSize:9,color:C.muted,letterSpacing:4,fontFamily:"'Press Start 2P',monospace"}}>ENTERING</div>
          <div style={{fontSize:10,color:C.gold,fontFamily:"'Press Start 2P',monospace",
            textShadow:`3px 3px 0 ${C.gold2}`,letterSpacing:2,textAlign:"center",padding:"0 20px"}}>
            FLOOR {floorTransition.floor}
          </div>
          <div style={{fontSize:8,color:C.muted,fontFamily:"'Press Start 2P',monospace",
            letterSpacing:2,textAlign:"center",padding:"0 20px"}}>
            {floorTransition.name}
          </div>
          {/* Animated divider */}
          <div style={{width:200,height:2,background:C.gold,animation:"floorLine 0.6s ease-out 0.3s both"}}/>
          <div style={{fontSize:7,color:C.muted,letterSpacing:3,marginTop:8}}>
            ✦ ✦ ✦
          </div>
        </div>
      )}

      {/* Boss intro overlay */}
      {bossIntro&&(
        <div style={{
          position:"absolute",inset:0,zIndex:2100,background:"#0a0005",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          gap:14,animation:"floorIn 0.3s ease-out",
        }}>
          <div style={{fontSize:52,animation:"bossFloat 0.6s ease-in-out infinite alternate"}}>☠</div>
          <div style={{fontSize:13,color:"#ff4040",fontFamily:"'Press Start 2P',monospace",
            textShadow:"4px 4px 0 #800",letterSpacing:3,textAlign:"center"}}>
            BOSS ENCOUNTER
          </div>
          <div style={{fontSize:8,color:"#cc2020",fontFamily:"'Press Start 2P',monospace",
            letterSpacing:2,textAlign:"center"}}>THE FINAL SCRATCH</div>
          <div style={{width:200,height:2,background:"#ff4040",margin:"4px 0"}}/>
          <div style={{fontSize:7,color:C.muted,fontFamily:"'Press Start 2P',monospace",
            letterSpacing:1,textAlign:"center",padding:"0 24px",lineHeight:2}}>
            SCRATCH 88% TO WIN · 3× MINIMUM PAYOUT
          </div>
          <div style={{fontSize:7,color:"#ff4040",letterSpacing:3,marginTop:8}}>☠ ☠ ☠</div>
          <style>{`@keyframes bossFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-8px) scale(1.1)}}`}</style>
        </div>
      )}

      {/* Relic glossary modal */}
      {showGlossary&&(
        <div onClick={()=>setShowGlossary(false)}
          style={{position:"absolute",inset:0,zIndex:1500,background:"rgba(0,0,0,0.85)",
            display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div onClick={e=>e.stopPropagation()}
            style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
              <div style={{fontSize:9,color:C.gold,letterSpacing:2}}>GLOSSARY</div>
              <button onClick={()=>{SFX.click();setShowGlossary(false);}}
                style={{background:"transparent",border:`1px solid ${C.line}`,color:C.muted,
                  fontFamily:"'Press Start 2P',monospace",fontSize:7,padding:"6px 10px",cursor:"pointer"}}>
                ✕ CLOSE
              </button>
            </div>
            {/* Themes section */}
            <div style={{fontSize:7,color:C.muted,letterSpacing:2,borderBottom:`1px solid ${C.line}`,paddingBottom:6}}>CARD THEMES</div>
            {THEMES.map(t=>(
              <div key={t.id} style={{background:C.bg2,border:`2px solid ${t.color}44`,padding:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:7,color:t.color,letterSpacing:1}}>{t.name}</span>
                  <span style={{fontSize:13,color:C.muted,fontFamily:"'VT323',monospace"}}>{t.mechanic.replace("_"," ").toUpperCase()}</span>
                </div>
                <div style={{fontSize:12,color:C.text,fontFamily:"'VT323',monospace",lineHeight:1.4}}>{t.goal}</div>
              </div>
            ))}
            {/* Relics section */}
            <div style={{fontSize:7,color:C.muted,letterSpacing:2,borderBottom:`1px solid ${C.line}`,paddingBottom:6,marginTop:8}}>ALL RELICS</div>
            {RELICS.map(r=>(
              <div key={r.id} style={{background:C.bg2,border:`1px solid ${RARITY_COLORS[r.rarity]}`,padding:10,display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontSize:22,flexShrink:0}}>{r.icon}</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",gap:8,alignItems:"baseline",marginBottom:2}}>
                    <span style={{fontSize:7,color:C.text}}>{r.name}</span>
                    <span style={{fontSize:5,color:RARITY_COLORS[r.rarity],letterSpacing:1,border:`1px solid ${RARITY_COLORS[r.rarity]}`,padding:"1px 4px"}}>{r.rarity.toUpperCase()}</span>
                    {gs&&gs.relicIds.includes(r.id)&&<span style={{fontSize:5,color:C.green,letterSpacing:1}}>✓ HELD</span>}
                  </div>
                  <div style={{fontSize:12,color:C.muted,fontFamily:"'VT323',monospace"}}>{r.desc}</div>
                </div>
              </div>
            ))}
            {/* Classes section */}
            <div style={{fontSize:7,color:C.muted,letterSpacing:2,borderBottom:`1px solid ${C.line}`,paddingBottom:6,marginTop:8}}>CLASSES</div>
            {CLASSES.map(cls=>(
              <div key={cls.id} style={{background:C.bg2,border:`1px solid ${C.line}`,padding:10,display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontSize:22,flexShrink:0}}>{cls.icon}</span>
                <div>
                  <div style={{fontSize:7,color:selClass.id===cls.id?C.gold:C.text,marginBottom:2}}>
                    {cls.name}{selClass.id===cls.id?" (YOU)":""}
                  </div>
                  <div style={{fontSize:12,color:C.muted,fontFamily:"'VT323',monospace"}}>{cls.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Screen */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {S[screen]||<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted}}>...</div>}
      </div>
      <style>{`
        @keyframes floorIn{from{opacity:0;transform:scale(1.04)}to{opacity:1;transform:scale(1)}}
        @keyframes floorLine{from{transform:scaleX(0)}to{transform:scaleX(1)}}
      `}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
